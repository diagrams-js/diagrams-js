<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>diagrams-ts - Icon Debug</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    .container {
      background: white;
      border-radius: 12px;
      padding: 40px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    h1 { color: #333; text-align: center; }
    button {
      background: #667eea;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      cursor: pointer;
      margin: 5px;
      font-size: 14px;
    }
    button:hover { background: #5568d3; }
    .output { margin-top: 20px; padding: 20px; background: #f5f5f5; border-radius: 8px; }
    .output img { max-width: 100%; height: auto; border: 1px solid #ddd; }
    .icon-preview { display: inline-block; margin: 10px; text-align: center; }
    .icon-preview img { width: 64px; height: 64px; border: 1px solid #ddd; background: white; }
    .debug { background: #fff3e0; padding: 10px; margin: 10px 0; border-radius: 4px; font-family: monospace; font-size: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Icon Loading Debug</h1>
    
    <button onclick="testIconLoading()">Test Icon Loading</button>
    <button onclick="testDiagramWithIcons()">Test Diagram with Icons</button>
    
    <div id="icon-preview" class="output"></div>
    <div id="diagram-output" class="output"></div>
  </div>

  <script type="module">
    async function loadIconAsDataUri(path) {
      console.log('Loading icon:', path);
      try {
        const response = await fetch(path);
        if (!response.ok) {
          console.error('Failed to fetch:', path, response.status);
          return null;
        }
        
        const blob = await response.blob();
        console.log('Fetched blob:', path, 'size:', blob.size, 'type:', blob.type);
        
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onloadend = () => {
            const result = reader.result;
            console.log('Converted to data URI:', path, 'length:', result.length);
            console.log('First 100 chars:', result.substring(0, 100));
            resolve(result);
          };
          reader.onerror = (e) => {
            console.error('FileReader error:', path, e);
            reject(e);
          };
          reader.readAsDataURL(blob);
        });
      } catch (e) {
        console.error('Error loading icon:', path, e);
        return null;
      }
    }

    window.testIconLoading = async () => {
      const output = document.getElementById('icon-preview');
      output.innerHTML = '<h3>Icon Loading Test</h3><div id="icons"></div>';
      const iconsDiv = document.getElementById('icons');
      
      const iconPaths = [
        { name: 'CloudFront', path: 'resources/aws/network/cloudfront.png' },
        { name: 'ELB', path: 'resources/aws/network/elastic-load-balancing.png' },
        { name: 'EC2', path: 'resources/aws/compute/ec2.png' },
        { name: 'S3', path: 'resources/aws/storage/s3.png' },
      ];
      
      for (const { name, path } of iconPaths) {
        const dataUri = await loadIconAsDataUri(path);
        
        if (dataUri) {
          iconsDiv.innerHTML += `
            <div class="icon-preview">
              <img src="${dataUri}" alt="${name}">
              <div>${name}</div>
              <div class="debug">Length: ${dataUri.length}<br>Hash: ${dataUri.substring(dataUri.length-20)}</div>
            </div>
          `;
        } else {
          iconsDiv.innerHTML += `<div class="icon-preview" style="color:red">${name}: FAILED</div>`;
        }
      }
    };

    window.testDiagramWithIcons = async () => {
      const output = document.getElementById('diagram-output');
      output.innerHTML = '<h3>Diagram Test</h3><div class="loading">Generating...</div>';
      
      try {
        // Load library
        const module = await import('./dist/index.mjs');
        const { Diagram, Node, setIconBaseDir } = module;
        
        // Load a single icon for testing
        const iconDataUri = await loadIconAsDataUri('resources/aws/compute/ec2.png');
        
        if (!iconDataUri) {
          output.innerHTML = '<div style="color:red">Failed to load icon</div>';
          return;
        }
        
        // Create custom node class with data URI icon
        class EC2Node extends Node {
          static _icon = iconDataUri;
          static _iconDir = '';
        }
        
        // Create diagram
        const diagram = new Diagram('Test', {
          direction: 'LR',
          outformat: 'svg',
          show: false
        });
        
        const server = diagram.add(new EC2Node('Server'));
        const client = diagram.add(new Node('Client'));
        client.to(server);
        
        // Show DOT
        const dot = diagram.toString();
        console.log('DOT:', dot);
        
        // Check if image attribute exists
        if (dot.includes('image="data:image/png;base64,')) {
          console.log('✓ DOT contains data URI image');
        } else if (dot.includes('image="')) {
          console.log('⚠ DOT contains image attribute but not data URI');
        } else {
          console.log('✗ DOT does not contain image attribute');
        }
        
        // Render
        const svg = await diagram.render();
        output.innerHTML = `
          <h3>Result</h3>
          <div>${typeof svg === 'string' ? svg : new TextDecoder().decode(svg)}</div>
          <h4>DOT Source</h4>
          <pre style="background:#1e1e1e;color:#d4d4d4;padding:10px;overflow:auto;font-size:10px">${dot}</pre>
        `;
        
      } catch (err) {
        output.innerHTML = `<div style="color:red">Error: ${err.message}</div>`;
        console.error(err);
      }
    };
  </script>
</body>
</html>

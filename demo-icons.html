<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>diagrams-ts - Working Icons Demo</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    .container {
      background: white;
      border-radius: 12px;
      padding: 40px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    h1 { 
      color: #333; 
      text-align: center;
      margin-bottom: 10px;
    }
    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
    }
    .info {
      background: #e3f2fd;
      border-left: 4px solid #2196f3;
      padding: 15px;
      margin: 20px 0;
      border-radius: 0 4px 4px 0;
    }
    button {
      background: #667eea;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      cursor: pointer;
      margin: 5px;
      font-size: 14px;
    }
    button:hover { background: #5568d3; }
    .output {
      margin-top: 20px;
      padding: 20px;
      background: #f5f5f5;
      border-radius: 8px;
      min-height: 300px;
    }
    .output svg {
      max-width: 100%;
      height: auto;
    }
    .loading {
      text-align: center;
      color: #667eea;
      padding: 40px;
    }
    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 10px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>diagrams-ts with Icons</h1>
    <p class="subtitle">AWS Architecture with Data URI Icons</p>
    
    <div class="info">
      <strong>How it works:</strong> Icons are fetched as PNG files, converted to base64 data URIs, 
      and embedded directly in the SVG. This bypasses browser security restrictions.
    </div>

    <button onclick="generateDiagram()">Generate AWS Architecture Diagram</button>
    
    <div class="output" id="output">
      <p style="color: #999; text-align: center;">Click the button to generate a diagram with icons</p>
    </div>
  </div>

  <script type="module">
    // Cache for icon data URIs
    const iconCache = {};

    async function getIconDataUri(iconPath) {
      if (iconCache[iconPath]) {
        return iconCache[iconPath];
      }

      try {
        const response = await fetch(iconPath);
        if (!response.ok) throw new Error(`Failed to fetch ${iconPath}`);
        
        const blob = await response.blob();
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onloadend = () => {
            iconCache[iconPath] = reader.result;
            resolve(reader.result);
          };
          reader.onerror = reject;
          reader.readAsDataURL(blob);
        });
      } catch (e) {
        console.error('Error loading icon:', e);
        return null;
      }
    }

    window.generateDiagram = async () => {
      const output = document.getElementById('output');
      output.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading icons and generating diagram...</p></div>';

      try {
        // Load the library
        const module = await import('./dist/index.mjs');
        const { Diagram, Node, Edge, Cluster, setIconBaseDir } = module;

        // Load provider classes
        const basePath = './dist/providers/aws/';
        const [network, compute, database, storage] = await Promise.all([
          import(basePath + 'network.js'),
          import(basePath + 'compute.js'),
          import(basePath + 'database.js'),
          import(basePath + 'storage.js')
        ]);

        // Get icon paths from the classes
        const getIconPath = (cls) => {
          const baseDir = window.location.origin + '/resources';
          return `${baseDir}/${cls._iconDir}/${cls._icon}`;
        };

        // Pre-load all icons as data URIs
        const iconPaths = [
          { name: 'CloudFront', path: getIconPath(network.CloudFront), class: network.CloudFront },
          { name: 'ELB', path: getIconPath(network.ELB), class: network.ELB },
          { name: 'EC2', path: getIconPath(compute.EC2), class: compute.EC2 },
          { name: 'RDS', path: getIconPath(database.RDS), class: database.RDS },
          { name: 'Dynamodb', path: getIconPath(database.Dynamodb), class: database.Dynamodb },
          { name: 'S3', path: getIconPath(storage.S3), class: storage.S3 },
        ];

        // Create custom Node classes with data URI icons
        const customClasses = {};
        
        for (const { name, path, class: OriginalClass } of iconPaths) {
          const dataUri = await getIconDataUri(path);
          if (dataUri) {
            // Create a new class that extends the original but with data URI icon
            customClasses[name] = class extends Node {
              static _icon = dataUri;
              static _iconDir = '';
              
              constructor(label) {
                super(label);
              }
            };
            console.log(`Loaded icon for ${name}: ${dataUri.substring(0, 50)}...`);
          } else {
            // Fallback to original class without icon
            customClasses[name] = OriginalClass;
            console.log(`Using original class for ${name} (no icon)`);
          }
        }

        // Create diagram
        const diagram = new Diagram('AWS Web Architecture', {
          direction: 'TB',
          outformat: 'svg',
          show: false
        });

        const { CloudFront, ELB, EC2, RDS, Dynamodb, S3 } = customClasses;

        // Build the architecture
        const cdn = diagram.add(new CloudFront('CloudFront'));
        const lb = diagram.add(new ELB('ALB'));
        
        diagram.cluster('Auto Scaling Group', (c) => {
          c.add(new Node('ASG'));
        });

        let web1, web2, web3;
        diagram.cluster('Web Tier', (c) => {
          web1 = c.add(new EC2('Web 1'));
          web2 = c.add(new EC2('Web 2'));
          web3 = c.add(new EC2('Web 3'));
        });

        let rds, dynamo;
        diagram.cluster('Database Tier', (c) => {
          rds = c.add(new RDS('PostgreSQL'));
          dynamo = c.add(new Dynamodb('DynamoDB'));
        });

        const s3 = diagram.add(new S3('S3'));

        // Connections
        cdn.to(lb);
        lb.to([web1, web2, web3]);
        web1.to([rds, dynamo, s3]);
        web2.to([rds, dynamo, s3]);
        web3.to([rds, dynamo, s3]);

        // Render
        const svg = await diagram.render();
        output.innerHTML = typeof svg === 'string' ? svg : new TextDecoder().decode(svg);

        console.log('Diagram generated successfully with icons!');

      } catch (err) {
        output.innerHTML = `<strong style="color: red;">Error:</strong> ${err.message}`;
        console.error(err);
      }
    };
  </script>
</body>
</html>

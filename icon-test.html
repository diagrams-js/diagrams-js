<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>diagrams-ts - Icon Test</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    h1 { color: #333; }
    .test-section {
      margin: 30px 0;
      padding: 20px;
      border: 2px solid #667eea;
      border-radius: 8px;
    }
    button {
      background: #667eea;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      cursor: pointer;
      margin: 5px;
      font-size: 14px;
    }
    button:hover { background: #5568d3; }
    .output {
      margin-top: 20px;
      padding: 20px;
      background: #f5f5f5;
      border-radius: 8px;
      min-height: 200px;
    }
    .output img {
      max-width: 100%;
      height: auto;
    }
    .info {
      background: #e3f2fd;
      padding: 15px;
      border-radius: 4px;
      margin: 20px 0;
    }
  </style>
</head>
<body>
  <h1>diagrams-ts Icon Support Test</h1>
  
  <div class="info">
    <strong>Testing icon support with different output formats</strong><br>
    This will test if PNG format renders icons better than SVG.
  </div>

  <div class="test-section">
    <h2>Test 1: SVG Output (with icons)</h2>
    <button onclick="testSVG()">Generate SVG with Icons</button>
    <div class="output" id="svg-output"></div>
  </div>

  <div class="test-section">
    <h2>Test 2: PNG Output (with icons)</h2>
    <button onclick="testPNG()">Generate PNG with Icons</button>
    <div class="output" id="png-output"></div>
  </div>

  <div class="test-section">
    <h2>Test 3: Data URI Icons (SVG)</h2>
    <button onclick="testDataURI()">Generate SVG with Data URI Icons</button>
    <div class="output" id="datauri-output"></div>
  </div>

  <script type="module">
    async function loadProviders() {
      // Test which path works
      const paths = ['dist/providers/aws/', './dist/providers/aws/', '/dist/providers/aws/'];
      for (const path of paths) {
        try {
          const response = await fetch(path + 'compute.js');
          if (response.ok) {
            const compute = await import(path + 'compute.js');
            const network = await import(path + 'network.js');
            return { EC2: compute.EC2, ELB: network.ELB };
          }
        } catch (e) {}
      }
      throw new Error('Could not load providers');
    }

    window.testSVG = async () => {
      const output = document.getElementById('svg-output');
      output.innerHTML = 'Loading...';
      
      try {
        const module = await import('./dist/index.mjs');
        const { Diagram, setIconBaseDir } = module;
        const { EC2, ELB } = await loadProviders();
        
        setIconBaseDir(window.location.origin + '/resources');
        
        const diagram = new Diagram('SVG Test', {
          direction: 'LR',
          outformat: 'svg',
          show: false
        });
        
        const lb = diagram.add(new ELB('Load Balancer'));
        const server = diagram.add(new EC2('Server'));
        lb.to(server);
        
        const svg = await diagram.render();
        output.innerHTML = typeof svg === 'string' ? svg : new TextDecoder().decode(svg);
        
        // Show DOT for debugging
        console.log('DOT output:', diagram.toString());
        
      } catch (err) {
        output.innerHTML = `<strong>Error:</strong> ${err.message}`;
        console.error(err);
      }
    };

    window.testPNG = async () => {
      const output = document.getElementById('png-output');
      output.innerHTML = 'Loading...';
      
      try {
        const module = await import('./dist/index.mjs');
        const { Diagram, setIconBaseDir } = module;
        const { EC2, ELB } = await loadProviders();
        
        setIconBaseDir(window.location.origin + '/resources');
        
        const diagram = new Diagram('PNG Test', {
          direction: 'LR',
          outformat: 'png',
          show: false
        });
        
        const lb = diagram.add(new ELB('Load Balancer'));
        const server = diagram.add(new EC2('Server'));
        lb.to(server);
        
        const png = await diagram.render();
        
        // Convert to blob and display
        const blob = new Blob([png], { type: 'image/png' });
        const url = URL.createObjectURL(blob);
        output.innerHTML = `<img src="${url}" alt="PNG Diagram">`;
        
      } catch (err) {
        output.innerHTML = `<strong>Error:</strong> ${err.message}`;
        console.error(err);
      }
    };

    window.testDataURI = async () => {
      const output = document.getElementById('datauri-output');
      output.innerHTML = 'Loading...';
      
      try {
        // Fetch icon and convert to data URI
        const iconResponse = await fetch('resources/aws/network/elastic-load-balancing.png');
        const iconBlob = await iconResponse.blob();
        const reader = new FileReader();
        
        reader.onloadend = async () => {
          const dataUri = reader.result;
          
          const module = await import('./dist/index.mjs');
          const { Diagram, Node, setIconBaseDir } = module;
          
          // Set base to empty so we use full data URIs
          setIconBaseDir('');
          
          const diagram = new Diagram('Data URI Test', {
            direction: 'LR',
            outformat: 'svg',
            show: false
          });
          
          // Create custom node with data URI icon
          class CustomLB extends Node {
            static _icon = dataUri;
            static _iconDir = '';
          }
          
          const lb = diagram.add(new CustomLB('Load Balancer'));
          const server = diagram.add(new Node('Server'));
          lb.to(server);
          
          const svg = await diagram.render();
          output.innerHTML = typeof svg === 'string' ? svg : new TextDecoder().decode(svg);
        };
        
        reader.readAsDataURL(iconBlob);
        
      } catch (err) {
        output.innerHTML = `<strong>Error:</strong> ${err.message}`;
        console.error(err);
      }
    };
  </script>
</body>
</html>
